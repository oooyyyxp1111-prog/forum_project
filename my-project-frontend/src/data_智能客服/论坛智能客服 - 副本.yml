# ========================================================================
# Dify 应用配置文件 - 论坛智能客服
# ========================================================================
# 应用名称：论坛智能客服
# 应用图标：🤖
# 工作流模式：advanced-chat（高级对话模式）
# 核心功能：基于 RAG（检索增强生成）的 Dify 产品知识问答
# 
# 【设计概览】
# 本工作流采用经典的“检索-生成”架构，包含四个核心节点：
#   1. 开始节点（Start）    - 接收用户输入
#   2. 知识检索节点（Knowledge Retrieval） - 在知识库中搜索相关段落
#   3. LLM 节点（LLM）      - 结合检索结果生成回答
#   4. 回答节点（Answer）   - 输出最终回复
# 
# 除此之外，画布中还包含多个用于团队协作和运维参考的注释节点，
# 以及若干未接入主流程的备用代码节点，方便后续功能扩展。
# 这些额外的元素不会影响主流程的执行，仅作为开发辅助。
# ========================================================================
# 
# 【YAML 结构说明】
# 本文件遵循 Dify 工作流导出规范，顶级键包括：
#   - app          : 应用基本信息
#   - dependencies : 依赖的插件及版本
#   - kind         : 应用类型（固定为 app）
#   - version      : 配置文件版本
#   - workflow     : 工作流主体，包含变量、功能开关、图结构等
# 
# 所有缩进使用两个空格，请勿混用制表符。
# ========================================================================

app:
  description: ''
  icon: 🤖
  icon_background: '#D1E9FF'
  icon_type: emoji
  mode: advanced-chat
  name: 论坛智能客服
  use_icon_as_answer_icon: false

# ========================================================================
# 【依赖声明】本应用所需的外部模型插件
# ========================================================================
dependencies:
- current_identifier: null
  type: marketplace
  value:
    marketplace_plugin_unique_identifier: langgenius/openai:0.4.2@21195ee1321849e0a7d4b3f6b2fd8c2be23ea6c7182e1b444ecc4c1711b52468
    version: null
- current_identifier: null
  type: marketplace
  value:
    marketplace_plugin_unique_identifier: langgenius/volcengine:0.0.7@4aa6b536e688521c7496718ebd8782365f6808f8db139b7079044311a00ed13e
    version: null

# -------------------- 应用元数据 --------------------
kind: app
version: 0.6.0

# ========================================================================
# 【工作流主体】
