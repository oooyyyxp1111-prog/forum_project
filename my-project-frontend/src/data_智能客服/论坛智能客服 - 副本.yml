      type: number
      default: 0.0
      description: 知识检索结果的置信度评分。
    - name: fallback_flag
      type: string
      default: 'false'
      description: 标记是否触发了兜底回复逻辑。
    - name: retry_count
      type: number
      default: 0
      description: 当前会话中用户重复提问的次数。
    - name: last_answer
      type: string
      default: ''
      description: 上一次回答的摘要，用于对话历史记忆。
