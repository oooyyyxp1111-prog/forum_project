      default: 'guest'
      description: 用户角色（游客/会员/管理员）。
    - name: preferred_model
      type: string
      default: 'doubao-seed'
      description: 用户偏好的模型名称（可配置切换）。
    - name: enable_debug_log
      type: string
      default: 'false'
      description: 是否开启调试日志输出。
    - name: test_flag_alpha
      type: string
      default: 'off'
      description: 用于 A/B 测试的功能开关 A。
    - name: test_flag_beta
      type: string
      default: 'off'
      description: 用于 A/B 测试的功能开关 B。
    - name: test_flag_gamma
      type: string
      default: 'off'
      description: 用于 A/B 测试的功能开关 C。
    - name: context_window_size
      type: number
      default: 5
      description: 对话上下文保留的轮数。
    - name: max_answer_length
      type: number
      default: 512
      description: 回答最大长度（token 数）。
    - name: temperature_override
      type: number
      default: -1
      description: 临时覆盖 temperature 参数（-1 表示使用默认）。
    - name: top_p_override
      type: number
      default: -1
      description: 临时覆盖 top_p 参数。
    - name: rerank_enabled
      type: string
      default: 'false'
      description: 是否启用重排序（Rerank）功能。
    - name: search_strategy
      type: string
      default: 'hybrid'
      description: 检索策略（hybrid/keyword/vector）。
    - name: chunk_size
      type: number
      default: 512
      description: 知识库文档分段大小。
    - name: overlap_tokens
      type: number
      default: 50
      description: 分段重叠 token 数。
    - name: embedding_model
      type: string
      default: 'text-embedding-3-small'
      description: 向量化模型名称。
    - name: retrieval_top_k
      type: number
      default: 3
      description: 检索返回的最大段落数。
    - name: similarity_threshold
      type: number
      default: 0.7
      description: 相似度阈值，低于此值的结果将被过滤。
    - name: prompt_template_version
      type: string
      default: 'v2.3'
      description: 当前使用的提示词模板版本。
    - name: response_format
      type: string
      default: 'text'
      description: 回答格式（text/markdown/json）。
    - name: enable_citation
      type: string
      default: 'false'
      description: 是否在回答中引用来源。
    - name: citation_style
      type: string
      default: 'footnote'
      description: 引用样式（footnote/bracket）。
    - name: log_level
      type: string
      default: 'info'
      description: 日志记录级别（debug/info/warning/error）。
    - name: metrics_enabled
      type: string
      default: 'false'
      description: 是否收集性能指标。
    - name: cache_ttl
      type: number
      default: 3600
      description: 检索结果缓存有效期（秒）。
    - name: fallback_response
      type: string
      default: '抱歉，我暂时无法回答这个问题，请换种方式提问。'
      description: 兜底回复模板。
    - name: greeting_enabled
