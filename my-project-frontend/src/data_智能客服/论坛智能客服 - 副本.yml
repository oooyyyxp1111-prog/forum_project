  # 【会话级变量】（用于存储用户会话过程中的临时状态）
  # 以下变量均已在系统中声明，但因未被任何节点引用，故不参与运行。
  # 它们可供未来扩展功能时使用，例如多轮对话中的上下文传递。
  # ======================================================================
  conversation_variables:
    - name: session_id
      type: string
      default: ''
      description: 当前会话的唯一标识符，用于追踪用户请求。
    - name: user_language
      type: string
      default: 'zh-CN'
      description: 用户偏好的语言代码，影响回答语种。
    - name: query_timestamp
      type: number
      default: 0
      description: 用户提问的时间戳，用于日志分析。
    - name: intent_category
      type: string
      default: 'general'
      description: 用户意图分类（如产品咨询、技术支持等）。
